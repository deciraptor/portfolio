<!DOCTYPE html>
<html lang="fr">

<head>
    <!-- Métadonnées -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bientôt des nouveautés sur le portfolio de David Ethevenaux - Analyste en cybersécurité.">
    <meta name="author" content="David Ethevenaux">
    <meta name="robots" content="noindex"> <!-- Empêche l'indexation temporaire -->

    <!-- Titre -->
    <title>Bientôt des nouveautés | David Ethevenaux</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="64x64" href="assets/icons/ravenBlue64.png">

    <!-- CSS -->
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/bootstrap-icons.css">
    <link rel="stylesheet" href="css/particles.css">
    <link rel="stylesheet" href="css/cyberPortfolio.css"> <!-- Pour les styles existants (ex: police, couleurs) -->

    <!-- Style personnalisé pour la page "Soon" -->
    <style>
        #mainBody {
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
        }
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }
        .soon-content {
            z-index: 1;
            padding: 20px;
            max-width: 800px;
            background-color: rgba(0, 0, 0, 0.5); /* Fond semi-transparent pour lisibilité */
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .soon-content h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #19c79a; /* Couleur accent de ton thème */
        }
        .soon-content p {
            font-size: 1.2em;
            line-height: 1.6;
        }
        .social-links {
            margin-top: 30px;
        }
        .social-links a {
            color: white;
            font-size: 2em;
            margin: 0 15px;
            transition: color 0.3s;
        }
        .social-links a:hover {
            color: #19c79a;
        }
    </style>
</head>

<body id="mainBody">
    <!-- Fond particules -->
    <div id="particles-js"></div>

    <!-- Contenu de la page "Soon" -->
    <div class="soon-content">
        <h1>Bientôt des nouveautés !</h1>
        <p>
            Revenez vite pour découvrir des projets incroyables !
        </p>
        
    </div>

    <!-- Scripts pour les particules -->
    <script src="js/particles.min.js"></script>
    <script src="js/cyberParticles.js"></script> <!-- Ton fichier de configuration des particules -->
</body>

</html>
